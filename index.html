<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INMU Chain Prototype</title>
  <style>
    :root {
      --bg: #05080d;
      --ink: #ecfff9;
      --soft: #8fb7b6;
      --panel: #0d151d;
      --panel-2: #111f2a;
      --line: rgba(255,255,255,.18);
      --player: #31f4d3;
      --player-2: #29a9ff;
      --cpu: #ff4f8b;
      --cpu-2: #9b5cff;
      --gold: #d9ff5a;
      --green: #34d399;
      --danger: #ff4f8b;
      --cell: clamp(66px, 18vw, 96px);
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(49,244,211,.16), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(155,92,255,.14), transparent 25%),
        linear-gradient(135deg, #030507 0%, var(--bg) 48%, #071118 100%);
      display: grid;
      place-items: start center;
      padding: 18px 10px 28px;
    }
    main {
      width: min(100%, 860px);
    }
    .title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .title-left {
      min-width: 0;
    }
    .portal-companion {
      position: relative;
      width: clamp(84px, 18vw, 126px);
      aspect-ratio: 1;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: visible;
      filter: drop-shadow(0 0 24px rgba(49,244,211,.28));
    }
    .portal-companion canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .portal-companion-fallback {
      position: absolute;
      inset: 18%;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #06111a;
      background:
        radial-gradient(circle at 35% 28%, #ecfff9, var(--player) 38%, var(--player-2) 76%);
      border: 2px solid rgba(236,255,249,.55);
      font-weight: 1000;
      letter-spacing: .04em;
      box-shadow:
        0 0 0 8px rgba(49,244,211,.08),
        0 0 36px rgba(49,244,211,.36);
      animation: portalBuddyFallback 2.8s ease-in-out infinite;
    }
    .portal-companion.is-3d .portal-companion-fallback {
      display: none;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .subtitle {
      color: var(--soft);
      font-size: .9rem;
    }
    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .game {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(49,244,211,.08), transparent 24%),
        rgba(5, 10, 15, .92);
      box-shadow: 0 28px 90px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08);
      padding: 14px;
    }
    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, transparent, black 18%, black 82%, transparent);
    }
    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .actions,
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .btn {
      min-height: 38px;
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--ink);
      background: rgba(255,255,255,.09);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .btn-primary {
      color: #06111a;
      background: linear-gradient(135deg, var(--player), var(--player-2));
      border-color: rgba(255,255,255,.28);
      font-weight: 800;
    }
    .btn-special {
      color: #1e1203;
      background: linear-gradient(135deg, var(--gold), var(--player));
      font-weight: 800;
    }
    .badge {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 11px;
      border: 1px solid var(--line);
      color: var(--soft);
      background: rgba(0,0,0,.24);
      font-size: .86rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .result {
      color: var(--gold);
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: .08em;
    }
    .leader-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: linear-gradient(135deg, rgba(49,244,211,.08), rgba(255,255,255,.025));
    }
    .leader-row.cpu {
      grid-template-columns: auto 1fr;
      margin-bottom: 10px;
      border-color: rgba(251,113,133,.32);
    }
    .leader-row.player {
      margin-top: 10px;
      border-color: rgba(34,211,238,.32);
    }
    .leader-avatar {
      width: 54px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 900;
      font-size: 1.2rem;
      border: 2px solid rgba(255,255,255,.36);
      box-shadow: 0 0 28px rgba(255,255,255,.12);
    }
    .cpu .leader-avatar {
      background: linear-gradient(135deg, var(--cpu), var(--cpu-2));
    }
    .player .leader-avatar {
      background: linear-gradient(135deg, var(--player), var(--player-2));
    }
    .leader-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }
    .leader-name {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
    }
    .hp-track,
    .gauge-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.13);
    }
    .gauge-track {
      height: 8px;
    }
    .hp-fill,
    .gauge-fill {
      width: 50%;
      height: 100%;
      transition: width .28s ease;
      background: linear-gradient(90deg, var(--player), var(--green));
    }
    .cpu-fill {
      background: linear-gradient(90deg, var(--cpu), var(--cpu-2));
    }
    .arena {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
    }
    .board-wrap {
      position: relative;
      padding: 12px;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(155,92,255,.12), transparent 35%, rgba(49,244,211,.14)),
        rgba(0,0,0,.26);
      border: 1px solid rgba(49,244,211,.22);
      box-shadow: inset 0 0 42px rgba(49,244,211,.06), 0 0 28px rgba(49,244,211,.08);
    }
    .board-wrap::before,
    .board-wrap::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(49,244,211,.34);
      border-radius: 10px;
      pointer-events: none;
      clip-path: polygon(0 0, 28px 0, 28px 8px, 8px 8px, 8px 28px, 0 28px, 0 0, 100% 0, calc(100% - 28px) 0, calc(100% - 28px) 8px, calc(100% - 8px) 8px, calc(100% - 8px) 28px, 100% 28px, 100% 0, 100% 100%, calc(100% - 28px) 100%, calc(100% - 28px) calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) calc(100% - 28px), 100% calc(100% - 28px), 100% 100%, 0 100%, 28px 100%, 28px calc(100% - 8px), 8px calc(100% - 8px), 8px calc(100% - 28px), 0 calc(100% - 28px));
      filter: drop-shadow(0 0 10px rgba(49,244,211,.32));
    }
    .board-wrap::after {
      inset: 13px;
      border-color: rgba(155,92,255,.24);
      transform: scaleY(-1);
    }
    .board {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, var(--cell));
      grid-template-rows: repeat(5, var(--cell));
      gap: 7px;
      touch-action: manipulation;
    }
    .effects-layer {
      position: absolute;
      z-index: 3;
      inset: 12px;
      width: calc(100% - 24px);
      height: calc(100% - 24px);
      pointer-events: none;
      overflow: visible;
    }
    .beam-core {
      stroke: rgba(255,255,255,.92);
      stroke-width: 8;
      stroke-linecap: round;
      marker-end: url(#arrow-tip);
      filter: drop-shadow(0 0 8px rgba(250,204,21,.95));
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: beamDraw .5s ease forwards;
    }
    .beam-glow {
      stroke: rgba(49,244,211,.72);
      stroke-width: 18;
      stroke-linecap: round;
      opacity: .72;
      filter: blur(1px) drop-shadow(0 0 14px rgba(49,244,211,.8));
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: beamDraw .5s ease forwards;
    }
    .beam-cpu .beam-glow {
      stroke: rgba(255,79,139,.76);
      filter: blur(1px) drop-shadow(0 0 14px rgba(255,79,139,.82));
    }
    .impact-burst {
      position: absolute;
      z-index: 5;
      width: 58px;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: burstPop .62s ease forwards;
    }
    .impact-burst::before,
    .impact-burst::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, #fff 0 14%, var(--gold) 15% 24%, var(--danger) 25% 44%, transparent 45%);
      clip-path: polygon(50% 0, 60% 30%, 92% 16%, 70% 46%, 100% 55%, 67% 62%, 82% 95%, 53% 72%, 28% 100%, 36% 65%, 0 70%, 30% 51%, 5% 23%, 40% 35%);
      filter: drop-shadow(0 0 10px rgba(251,113,133,.75));
    }
    .impact-burst::after {
      inset: 10px;
      background: radial-gradient(circle, #fff 0 18%, #fffd9a 19% 48%, transparent 49%);
      transform: rotate(22deg);
    }
    .cell {
      position: relative;
      min-width: 0;
      min-height: 0;
      padding: 0;
      border-radius: 10px;
      border: 1px solid rgba(49,244,211,.13);
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(49,244,211,.07), rgba(255,255,255,.015)),
        rgba(255,255,255,.028);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 8px 18px rgba(0,0,0,.22);
      overflow: visible;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }
    .cell::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px dashed rgba(255,255,255,.1);
      border-radius: 10px;
      pointer-events: none;
    }
    .cell.player-zone {
      background:
        linear-gradient(145deg, rgba(49,244,211,.15), rgba(41,169,255,.06)),
        rgba(255,255,255,.04);
    }
    .cell.cpu-zone {
      background:
        linear-gradient(145deg, rgba(255,79,139,.13), rgba(155,92,255,.08)),
        rgba(255,255,255,.04);
    }
    .cell:not(:disabled):hover,
    .cell:not(:disabled):focus-visible {
      transform: translateY(-2px);
      border-color: rgba(217,255,90,.75);
      box-shadow: 0 0 0 3px rgba(217,255,90,.14), 0 14px 28px rgba(0,0,0,.28);
    }
    .cell.hit-cell {
      animation: hitCell .5s ease;
    }
    .unit {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      justify-items: center;
      padding: 5px;
      text-align: center;
      isolation: isolate;
    }
    .unit::before {
      content: "";
      position: absolute;
      inset: 4px;
      z-index: -1;
      border-radius: 11px;
      opacity: .9;
      background: linear-gradient(145deg, rgba(49,244,211,.20), rgba(41,169,255,.16));
    }
    .cpu .unit::before {
      background: linear-gradient(145deg, rgba(255,79,139,.20), rgba(155,92,255,.18));
    }
    .unit-name {
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-height: 1.05rem;
      font-size: .72rem;
      font-weight: 900;
      text-shadow: 0 1px 4px rgba(0,0,0,.7);
    }
    .piece-frame {
      position: relative;
      width: min(72px, 82%);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #06111a;
      background: linear-gradient(135deg, var(--player), var(--player-2));
      border: 2px solid rgba(255,255,255,.46);
      font-size: 1.28rem;
      font-weight: 900;
      box-shadow:
        0 0 0 5px rgba(0,0,0,.35),
        0 0 0 8px rgba(49,244,211,.24),
        0 0 20px rgba(49,244,211,.34);
      overflow: visible;
    }
    .cpu .piece-frame {
      background: linear-gradient(135deg, var(--cpu), var(--cpu-2));
      box-shadow:
        0 0 0 5px rgba(0,0,0,.35),
        0 0 0 8px rgba(255,79,139,.22),
        0 0 20px rgba(255,79,139,.34);
    }
    .leader .piece-frame {
      background: linear-gradient(135deg, var(--gold), #fff7ad);
      box-shadow: 0 0 24px rgba(250,204,21,.35);
    }
    .piece-3d {
      position: absolute;
      inset: -46%;
      width: 192%;
      height: 192%;
      display: block;
      z-index: 1;
    }
    .piece-fallback {
      position: relative;
      z-index: 0;
    }
    .piece-frame.is-3d .piece-fallback {
      opacity: 0;
    }
    .arrows {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
      pointer-events: none;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 900;
      line-height: 1;
    }
    .arrows span {
      opacity: .14;
    }
    .arrows .on {
      opacity: 1;
      color: var(--gold);
      transform: scale(1.28);
      filter: drop-shadow(0 0 7px rgba(250,204,21,.9));
    }
    .placement-preview {
      position: absolute;
      inset: 8px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: rgba(236,255,249,.72);
      background: rgba(0,0,0,.18);
      opacity: .42;
      pointer-events: none;
      transition: opacity .14s ease, transform .14s ease;
    }
    .cell:not(:disabled):hover .placement-preview,
    .cell:not(:disabled):focus-visible .placement-preview {
      opacity: .9;
      transform: scale(1.03);
    }
    .placement-preview .arrows {
      inset: 6px;
      font-size: 1.08rem;
    }
    .placement-preview .arrows .on {
      color: var(--player);
      filter: drop-shadow(0 0 8px rgba(49,244,211,.95));
    }
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 900;
    }
    .stats span {
      min-width: 0;
      border-radius: 6px;
      padding: 2px 4px;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.14);
    }
    .stats .hp-pill {
      color: #071109;
      background: linear-gradient(90deg, #63e65f 0 70%, #db4a3e 71% 100%);
      text-shadow: none;
      transform: skewX(-14deg);
    }
    .stats .atk-pill {
      background: rgba(0,0,0,.62);
    }
    .unit-trait {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 3;
      min-width: 1.35rem;
      min-height: 1.35rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #061118;
      background: linear-gradient(135deg, var(--gold), var(--player));
      border: 1px solid rgba(255,255,255,.58);
      font-size: .72rem;
      font-weight: 1000;
      box-shadow: 0 0 12px rgba(217,255,90,.36);
    }
    .leader {
      outline: 2px solid rgba(250,204,21,.8);
      outline-offset: -4px;
    }
    .active-flash {
      animation: chainPulse .36s ease;
    }
    .damage {
      position: absolute;
      z-index: 4;
      inset: auto 5px 6px auto;
      color: #fff;
      border-radius: 999px;
      padding: 2px 6px;
      background: var(--danger);
      font-weight: 900;
      pointer-events: none;
      animation: floatHit .65s ease forwards;
      box-shadow: 0 0 16px rgba(251,113,133,.45);
    }
    .combo {
      position: absolute;
      z-index: 3;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-6deg);
      display: none;
      color: #090d14;
      background: linear-gradient(135deg, var(--gold), #fff4a3);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 1000;
      letter-spacing: .08em;
      box-shadow: 0 18px 40px rgba(0,0,0,.38);
      pointer-events: none;
    }
    .combo.show {
      display: block;
      animation: comboPop .62s ease forwards;
    }
    .hand {
      width: min(100%, 610px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }
    .card-btn {
      min-height: 112px;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      gap: 6px;
      text-align: left;
      border-radius: 14px;
      padding: 10px;
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(49,244,211,.16), rgba(41,169,255,.10)),
        rgba(255,255,255,.06);
      border: 1px solid rgba(49,244,211,.28);
      box-shadow: 0 12px 26px rgba(0,0,0,.26);
      overflow: hidden;
    }
    .card-btn::after {
      content: "";
      position: absolute;
      right: -24px;
      top: -24px;
      width: 70px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
    }
    .card-btn[aria-pressed="true"] {
      transform: translateY(-4px);
      border-color: rgba(217,255,90,.95);
      box-shadow: 0 0 0 3px rgba(217,255,90,.16), 0 18px 34px rgba(0,0,0,.34);
    }
    .card-name {
      font-weight: 1000;
      letter-spacing: .02em;
    }
    .card-core {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }
    .card-sigil {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #06111a;
      background: linear-gradient(135deg, var(--player), var(--player-2));
      border: 2px solid rgba(255,255,255,.48);
      font-size: 1.2rem;
      font-weight: 1000;
    }
    .card-arrow-map {
      position: relative;
      min-height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(49,244,211,.18);
      background: rgba(0,0,0,.22);
      overflow: hidden;
    }
    .card-arrow-map::before {
      content: "LINK";
      position: absolute;
      right: 6px;
      bottom: 4px;
      color: rgba(143,183,182,.32);
      font-size: .62rem;
      font-weight: 900;
      letter-spacing: .08em;
    }
    .card-arrow-map .arrows {
      inset: 4px;
      font-size: .78rem;
    }
    .card-arrow-map .arrows .on {
      color: var(--gold);
      filter: drop-shadow(0 0 6px rgba(217,255,90,.72));
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      font-size: .76rem;
      color: var(--soft);
      font-weight: 800;
    }
    .chip {
      border-radius: 999px;
      padding: 2px 6px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
    }
    .logbar {
      position: relative;
      z-index: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      border-radius: 12px;
      padding: 8px 12px;
      color: var(--soft);
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.1);
      text-align: center;
      font-weight: 700;
    }
    @keyframes chainPulse {
      0% { transform: scale(1); filter: brightness(1); }
      45% { transform: scale(1.07); filter: brightness(1.35); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    @keyframes hitCell {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 8px 18px rgba(0,0,0,.22); }
      38% { box-shadow: 0 0 0 4px rgba(251,113,133,.24), 0 0 24px rgba(251,113,133,.52); }
    }
    @keyframes beamDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes burstPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.45) rotate(-12deg); }
      24% { opacity: 1; transform: translate(-50%, -50%) scale(1.08) rotate(8deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) rotate(28deg); }
    }
    @keyframes floatHit {
      0% { opacity: 0; transform: translateY(6px) scale(.86); }
      25% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-22px) scale(1.08); }
    }
    @keyframes comboPop {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(-8deg) scale(.78); }
      30% { opacity: 1; transform: translate(-50%, -50%) rotate(-6deg) scale(1.08); }
      100% { opacity: 0; transform: translate(-50%, -80%) rotate(-3deg) scale(1); }
    }
    @keyframes portalBuddyFallback {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-7px) rotate(4deg); }
    }
    @media (max-width: 620px) {
      body {
        padding-inline: 6px;
      }
      .game {
        padding: 9px;
        border-radius: 14px;
      }
      .leader-row {
        padding: 8px;
      }
      .leader-avatar {
        width: 44px;
      }
      .board-wrap {
        padding: 7px;
      }
      .board {
        gap: 5px;
      }
      .hand {
        gap: 6px;
      }
      .card-btn {
        min-height: 104px;
        padding: 8px;
      }
      .card-sigil {
        width: 36px;
      }
      .portal-companion {
        width: 82px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="title-row">
      <div class="title-left">
        <h1>INMU Portal Chain</h1>
        <div class="subtitle">INMU PORTAL battle module</div>
      </div>
      <div class="portal-companion" id="portal-companion" aria-label="INMU PORTALの3Dマスコット">
        <canvas id="portal-buddy"></canvas>
        <div class="portal-companion-fallback">IN</div>
      </div>
      <div class="badge">PORTAL ARENA</div>
    </div>

    <section class="game" id="game">
      <div class="topbar">
        <div class="actions">
          <button type="button" class="btn btn-primary" id="new-game">リスタート</button>
          <button type="button" class="btn btn-special" id="special">PORTAL BURST</button>
        </div>
        <div class="status-strip">
          <span class="badge" id="turn">PLAYER TURN</span>
          <span class="result" id="result"></span>
        </div>
      </div>

      <div class="leader-row cpu" aria-label="CPUリーダー">
        <div class="leader-avatar">CPU</div>
        <div class="leader-main">
          <div class="leader-name"><span>RIVAL NODE</span><span id="cpu-hp">30</span></div>
          <div class="hp-track"><div class="hp-fill cpu-fill" id="cpu-hpbar"></div></div>
          <div class="gauge-track"><div class="gauge-fill cpu-fill" id="cpu-gaugebar"></div></div>
        </div>
      </div>

      <div class="arena">
        <div class="board-wrap">
          <div class="combo" id="combo">CHAIN x2</div>
          <svg class="effects-layer" id="effects-layer" aria-hidden="true"></svg>
          <div class="board" id="board" role="grid" aria-label="5行3列のバトル盤面"></div>
        </div>
      </div>

      <div class="leader-row player" aria-label="プレイヤーリーダー">
        <div class="leader-main">
          <div class="leader-name"><span>MY NODE</span><span id="player-hp">30</span></div>
          <div class="hp-track"><div class="hp-fill" id="player-hpbar"></div></div>
          <div class="gauge-track"><div class="gauge-fill" id="player-gaugebar"></div></div>
        </div>
        <div class="leader-avatar">YOU</div>
      </div>

      <div class="hand" id="hand" aria-label="手札"></div>
      <div class="logbar" id="log">手札を選んで、空きマスに配置。</div>
    </section>
  </main>

  <script>
    (() => {
      const boardEl = document.getElementById('board');
      const effectsEl = document.getElementById('effects-layer');
      const handEl = document.getElementById('hand');
      const logEl = document.getElementById('log');
      const resultEl = document.getElementById('result');
      const turnEl = document.getElementById('turn');
      const comboEl = document.getElementById('combo');
      const specialBtn = document.getElementById('special');
      const dirs = {
        N: [-1, 0, '↑'], NE: [-1, 1, '↗'], E: [0, 1, '→'], SE: [1, 1, '↘'],
        S: [1, 0, '↓'], SW: [1, -1, '↙'], W: [0, -1, '←'], NW: [-1, -1, '↖']
      };
      const arrowCells = ['NW','N','NE','W','C','E','SW','S','SE'];
      const roster = [
        { name: '拓也', mark: '卍', hp: 7, atk: 3, arrows: ['N','NE','NW'], skill: '追撃', pierce: true },
        { name: 'ニャルシアン', mark: '肉', hp: 5, atk: 2, arrows: ['N','E','W','SE','SW'], skill: '回復' },
        { name: 'レオン', mark: '王', hp: 9, atk: 2, arrows: ['N','E','S','W'], skill: '守護' },
        { name: 'INMUくん', mark: '?', hp: 4, atk: 4, arrows: ['NE','NW','SE','SW'], skill: '奇襲' },
        { name: 'ミラ', mark: '光', hp: 6, atk: 2, arrows: ['N','NE','E'], skill: '展開' },
        { name: 'ゴウ', mark: '剛', hp: 8, atk: 3, arrows: ['N','S'], skill: '突破', pierce: true }
      ];
      let state;
      let lastEffects = [];
      let lastLinks = [];

      function freshUnit(base, side, leader = false) {
        return {
          id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
          name: leader ? (side === 'player' ? '自リーダー' : '敵リーダー') : base.name,
          mark: leader ? (side === 'player' ? 'YOU' : 'CPU') : base.mark,
          hp: leader ? 30 : base.hp,
          maxHp: leader ? 30 : base.hp,
          atk: leader ? 0 : base.atk,
          arrows: leader ? [] : base.arrows.slice(),
          pierce: !leader && !!base.pierce,
          side,
          leader
        };
      }

      function newGame() {
        state = {
          cells: Array(15).fill(null),
          playerHp: 30,
          cpuHp: 30,
          playerGauge: 0,
          cpuGauge: 0,
          hand: drawHand(),
          selected: 0,
          turn: 'player',
          locked: false,
          over: false
        };
        state.cells[indexOf(4, 1)] = freshUnit({}, 'player', true);
        state.cells[indexOf(0, 1)] = freshUnit({}, 'cpu', true);
        lastEffects = [];
        lastLinks = [];
        resultEl.textContent = '';
        logEl.textContent = '手札を選んで、空きマスに配置。';
        render();
      }

      function drawHand() {
        return Array.from({ length: 3 }, () => roster[Math.floor(Math.random() * roster.length)]);
      }

      function indexOf(r, c) { return r * 3 + c; }
      function posOf(i) { return [Math.floor(i / 3), i % 3]; }
      function inBounds(r, c) { return r >= 0 && r < 5 && c >= 0 && c < 3; }

      function renderArrows(unit) {
        return '<div class="arrows" aria-hidden="true">' + arrowCells.map(d => {
          if (d === 'C') return '<span>•</span>';
          return '<span class="' + (unit.arrows.includes(d) ? 'on' : '') + '">' + dirs[d][2] + '</span>';
        }).join('') + '</div>';
      }

      function renderUnit(unit) {
        return '<div class="unit"><div class="unit-name">' + unit.name + '</div>' +
          '<div class="piece-frame"><canvas class="piece-3d" data-side="' + unit.side + '" data-name="' + unit.name + '" data-mark="' + unit.mark + '" data-leader="' + String(unit.leader) + '"></canvas><span class="piece-fallback">' + unit.mark + '</span></div>' +
          (unit.pierce ? '<span class="unit-trait">貫</span>' : '') +
          renderArrows(unit) +
          '<div class="stats"><span class="hp-pill">' + unit.hp + '</span><span class="atk-pill">⚔ ' + unit.atk + '</span></div></div>';
      }

      function renderArrowMap(arrows, className) {
        return '<div class="' + className + '">' + renderArrows({ arrows }) + '</div>';
      }

      function render() {
        boardEl.innerHTML = '';
        state.cells.forEach((unit, i) => {
          const [r] = posOf(i);
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'cell ' + (r < 2 ? 'cpu-zone' : r > 2 ? 'player-zone' : '');
          if (lastEffects.some(e => e.index === i)) cell.classList.add('hit-cell');
          cell.setAttribute('role', 'gridcell');
          cell.setAttribute('aria-label', unit ? unit.name + ' HP ' + unit.hp : '空きマス');
          cell.disabled = state.locked || state.over || state.turn !== 'player' || !!unit;
          cell.addEventListener('click', () => placePlayer(i));
          if (unit) {
            cell.classList.add(unit.side, unit.leader ? 'leader' : 'fighter');
            cell.innerHTML = renderUnit(unit);
          } else if (!state.over && state.turn === 'player' && !state.locked) {
            const selectedCard = state.hand[state.selected];
            cell.innerHTML = '<div class="placement-preview" aria-hidden="true">' + renderArrows(selectedCard) + '</div>';
          }
          boardEl.appendChild(cell);
        });

        renderEffects();
        lastEffects.forEach(effect => showDamage(effect.index, effect.amount));
        window.setTimeout(() => {
          lastEffects = [];
          lastLinks = [];
          effectsEl.innerHTML = '';
        }, 760);


        handEl.innerHTML = '';
        state.hand.forEach((card, i) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'card-btn';
          btn.setAttribute('aria-pressed', String(state.selected === i));
          btn.disabled = state.locked || state.over || state.turn !== 'player';
          btn.innerHTML = '<div class="card-name">' + card.name + '</div>' +
            '<div class="card-core"><div class="card-sigil">' + card.mark + '</div>' + renderArrowMap(card.arrows, 'card-arrow-map') + '</div>' +
            '<div class="card-meta"><span class="chip">HP ' + card.hp + '</span><span class="chip">ATK ' + card.atk + '</span><span class="chip">' + card.skill + '</span>' + (card.pierce ? '<span class="chip">貫通</span>' : '') + '</div>';
          btn.addEventListener('click', () => { state.selected = i; render(); });
          handEl.appendChild(btn);
        });

        document.getElementById('player-hp').textContent = state.playerHp;
        document.getElementById('cpu-hp').textContent = state.cpuHp;
        document.getElementById('player-hpbar').style.width = Math.max(0, state.playerHp / 30 * 100) + '%';
        document.getElementById('cpu-hpbar').style.width = Math.max(0, state.cpuHp / 30 * 100) + '%';
        document.getElementById('player-gaugebar').style.width = Math.max(0, state.playerGauge / 10 * 100) + '%';
        document.getElementById('cpu-gaugebar').style.width = Math.max(0, state.cpuGauge / 10 * 100) + '%';
        turnEl.textContent = state.turn === 'player' ? 'PLAYER TURN' : 'CPU TURN';
        specialBtn.disabled = state.locked || state.over || state.turn !== 'player' || state.playerGauge < 10;
        window.INMUPiece3D?.hydrate();
      }

      function placePlayer(i) {
        if (state.over || state.locked || state.cells[i]) return;
        const card = state.hand[state.selected];
        state.cells[i] = freshUnit(card, 'player');
        state.hand[state.selected] = roster[Math.floor(Math.random() * roster.length)];
        state.playerGauge = Math.min(10, state.playerGauge + 2);
        const hits = resolveChain(i, 'player');
        if (hits > 1) showCombo(hits);
        if (!state.over) endPlayerTurn();
      }

      function endPlayerTurn() {
        state.turn = 'cpu';
        state.locked = true;
        render();
        window.setTimeout(cpuTurn, 720);
      }

      function cpuTurn() {
        if (state.over) return;
        const empty = state.cells.map((u, i) => u ? null : i).filter(i => i !== null);
        const choices = empty.map(i => ({ i, card: roster[Math.floor(Math.random() * roster.length)] }));
        choices.sort((a, b) => scorePlacement(b.i, b.card, 'cpu') - scorePlacement(a.i, a.card, 'cpu'));
        const pick = choices[0];
        if (pick) {
          state.cells[pick.i] = freshUnit(pick.card, 'cpu');
          state.cpuGauge = Math.min(10, state.cpuGauge + 2);
          logEl.textContent = 'CPUが' + pick.card.name + 'を配置。';
          const hits = resolveChain(pick.i, 'cpu');
          if (hits > 1) showCombo(hits);
        }
        if (!state.over) {
          if (state.cpuGauge >= 10 && state.playerHp <= 8) useCpuSkill();
          state.turn = 'player';
          state.locked = false;
          render();
        }
      }

      function scorePlacement(i, card, side) {
        const [r, c] = posOf(i);
        let score = side === 'cpu' ? r : 4 - r;
        for (const d of card.arrows) {
          const [dr, dc] = dirs[d];
          let nr = r + dr, nc = c + dc;
          while (inBounds(nr, nc)) {
            const target = state.cells[indexOf(nr, nc)];
            if (target && target.side !== side) score += target.leader ? 10 : 4;
            if (target && target.side === side && !target.leader) score += 3;
            if (!card.pierce) break;
            nr += dr;
            nc += dc;
          }
        }
        return score + Math.random();
      }

      function resolveChain(startIndex, side) {
        const queue = [startIndex];
        const seen = new Set();
        let hits = 0;
        lastEffects = [];
        lastLinks = [];
        while (queue.length) {
          const i = queue.shift();
          if (seen.has(i)) continue;
          seen.add(i);
          const unit = state.cells[i];
          if (!unit || unit.side !== side || unit.leader) continue;
          flash(i);
          const [r, c] = posOf(i);
          for (const d of unit.arrows) {
            const [dr, dc] = dirs[d];
            let nr = r + dr, nc = c + dc;
            while (inBounds(nr, nc)) {
              const ni = indexOf(nr, nc);
              const target = state.cells[ni];
              if (target) {
                if (target.side === side && !target.leader && !seen.has(ni)) {
                  lastLinks.push({ from: i, to: ni, side, chain: true });
                  queue.push(ni);
                } else if (target.side !== side) {
                  damageTarget(ni, unit.atk, side, i, unit.pierce);
                  hits += 1;
                }
              }
              if (!unit.pierce) break;
              nr += dr;
              nc += dc;
            }
          }
        }
        if (hits > 0) {
          if (side === 'player') state.playerGauge = Math.min(10, state.playerGauge + hits);
          else state.cpuGauge = Math.min(10, state.cpuGauge + hits);
        }
        checkWin();
        render();
        return hits;
      }

      function damageTarget(i, amount, side, fromIndex, pierce = false) {
        const target = state.cells[i];
        if (!target) return;
        if (fromIndex != null) lastLinks.push({ from: fromIndex, to: i, side, hit: true });
        if (target.leader) {
          if (target.side === 'player') state.playerHp = Math.max(0, state.playerHp - amount);
          else state.cpuHp = Math.max(0, state.cpuHp - amount);
        } else {
          target.hp -= amount;
          if (target.hp <= 0) state.cells[i] = null;
        }
        lastEffects.push({ index: i, amount });
        logEl.textContent = (pierce ? 'PIERCE LINK! ' : (side === 'player' ? 'LINK CHAIN! ' : 'CPU LINK! ')) + amount + 'ダメージ。';
      }

      function showDamage(i, amount) {
        const cell = boardEl.children[i];
        if (!cell) return;
        const pop = document.createElement('span');
        pop.className = 'damage';
        pop.textContent = '-' + amount;
        cell.appendChild(pop);
        const burst = document.createElement('span');
        burst.className = 'impact-burst';
        const rect = cell.getBoundingClientRect();
        const boardRect = boardEl.getBoundingClientRect();
        burst.style.left = (rect.left - boardRect.left + rect.width / 2 + 12) + 'px';
        burst.style.top = (rect.top - boardRect.top + rect.height / 2 + 12) + 'px';
        boardEl.parentElement.appendChild(burst);
        window.setTimeout(() => burst.remove(), 720);
      }

      function renderEffects() {
        const width = boardEl.offsetWidth;
        const height = boardEl.offsetHeight;
        effectsEl.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
        effectsEl.innerHTML = '<defs><marker id="arrow-tip" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="rgba(217,255,90,.95)"></path></marker></defs>';
        const frag = document.createDocumentFragment();
        lastLinks.forEach((link, order) => {
          const from = centerOf(link.from);
          const to = centerOf(link.to);
          if (!from || !to) return;
          const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          group.setAttribute('class', link.side === 'cpu' ? 'beam-cpu' : 'beam-player');
          group.style.animationDelay = (order * 80) + 'ms';
          const glow = makeBeam('beam-glow', from, to);
          const core = makeBeam('beam-core', from, to);
          glow.style.animationDelay = (order * 80) + 'ms';
          core.style.animationDelay = (order * 80) + 'ms';
          group.appendChild(glow);
          group.appendChild(core);
          frag.appendChild(group);
        });
        effectsEl.appendChild(frag);
      }

      function makeBeam(className, from, to) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('class', className);
        line.setAttribute('x1', from.x);
        line.setAttribute('y1', from.y);
        line.setAttribute('x2', to.x);
        line.setAttribute('y2', to.y);
        line.setAttribute('pathLength', '1');
        return line;
      }

      function centerOf(index) {
        const cell = boardEl.children[index];
        if (!cell) return null;
        const rect = cell.getBoundingClientRect();
        const boardRect = boardEl.getBoundingClientRect();
        return {
          x: rect.left - boardRect.left + rect.width / 2,
          y: rect.top - boardRect.top + rect.height / 2
        };
      }

      function flash(i) {
        const cell = boardEl.children[i];
        if (!cell) return;
        cell.classList.remove('active-flash');
        void cell.offsetWidth;
        cell.classList.add('active-flash');
      }

      function showCombo(hits) {
        comboEl.textContent = 'CHAIN x' + hits;
        comboEl.classList.remove('show');
        void comboEl.offsetWidth;
        comboEl.classList.add('show');
      }

      function checkWin() {
        if (state.cpuHp <= 0 || state.playerHp <= 0) {
          state.over = true;
          state.locked = false;
          resultEl.textContent = state.cpuHp <= 0 ? 'WIN' : 'LOSE';
          logEl.textContent = state.cpuHp <= 0 ? '勝利！リンクをつないで押し切った。' : '敗北。矢印の向きと配置順を変えて再挑戦。';
        }
      }

      function usePlayerSkill() {
        if (state.playerGauge < 10 || state.over) return;
        state.playerGauge = 0;
        state.cpuHp = Math.max(0, state.cpuHp - 6);
        lastEffects = [{ index: indexOf(0, 1), amount: 6 }];
        lastLinks = [{ from: indexOf(4, 1), to: indexOf(0, 1), side: 'player', hit: true }];
        logEl.textContent = 'PORTAL BURST：敵リーダーに6ダメージ。';
        checkWin();
        if (!state.over) endPlayerTurn();
        render();
      }

      function useCpuSkill() {
        state.cpuGauge = 0;
        state.playerHp = Math.max(0, state.playerHp - 5);
        lastEffects = [{ index: indexOf(4, 1), amount: 5 }];
        lastLinks = [{ from: indexOf(0, 1), to: indexOf(4, 1), side: 'cpu', hit: true }];
        logEl.textContent = 'RIVAL BURST：自リーダーに5ダメージ。';
        checkWin();
      }

      document.getElementById('new-game').addEventListener('click', newGame);
      specialBtn.addEventListener('click', usePlayerSkill);
      newGame();
    })();
  </script>
  <script>
    (() => {
      const host = document.getElementById('portal-companion');

        .then((THREE) => {

          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          renderer.outputColorSpace = THREE.SRGBColorSpace;

          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
          camera.position.set(0, 0.25, 5.4);

          const group = new THREE.Group();
          scene.add(group);

          const mint = new THREE.MeshStandardMaterial({
            color: 0x31f4d3,
            emissive: 0x0b8f7f,
            emissiveIntensity: 0.7,
            metalness: 0.35,
            roughness: 0.22
          });
          const blue = new THREE.MeshStandardMaterial({
            color: 0x29a9ff,
            emissive: 0x064d86,
            emissiveIntensity: 0.5,
            metalness: 0.4,
            roughness: 0.25
          });
          const ink = new THREE.MeshStandardMaterial({
            color: 0x071118,
            emissive: 0x02080a,
            emissiveIntensity: 0.2,
            metalness: 0.1,
            roughness: 0.45
          });
          const glow = new THREE.MeshBasicMaterial({
            color: 0xd9ff5a,
            transparent: true,
            opacity: 0.82
          });

          const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.58, 0.95, 8, 18), mint);
          body.position.y = -0.45;
          body.rotation.z = -0.08;
          group.add(body);

          const head = new THREE.Mesh(new THREE.SphereGeometry(0.64, 32, 24), blue);
          head.position.y = 0.6;
          group.add(head);

          const visor = new THREE.Mesh(new THREE.BoxGeometry(0.92, 0.18, 0.1), glow);
          visor.position.set(0, 0.68, 0.57);
          group.add(visor);

          const core = new THREE.Mesh(new THREE.TorusGeometry(0.31, 0.035, 12, 48), glow);
          core.position.set(0, -0.34, 0.56);
          group.add(core);

          const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 12), ink);
          leftEye.position.set(-0.2, 0.75, 0.61);
          const rightEye = leftEye.clone();
          rightEye.position.x = 0.2;
          group.add(leftEye, rightEye);

          const antennaMat = new THREE.MeshStandardMaterial({
            color: 0xd9ff5a,
            emissive: 0x6f8f05,
            emissiveIntensity: 0.8,
            metalness: 0.2,
            roughness: 0.2
          });
          const antennaL = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.52, 18), antennaMat);
          antennaL.position.set(-0.42, 1.13, 0.03);
          antennaL.rotation.z = 0.56;
          const antennaR = antennaL.clone();
          antennaR.position.x = 0.42;
          antennaR.rotation.z = -0.56;
          group.add(antennaL, antennaR);

          const ring = new THREE.Mesh(new THREE.TorusGeometry(1.18, 0.025, 10, 80), glow);
          ring.rotation.x = 1.3;
          ring.position.y = -0.05;
          group.add(ring);

          const lightA = new THREE.PointLight(0x31f4d3, 2.4, 8);
          lightA.position.set(2.2, 2.2, 3.2);
          const lightB = new THREE.PointLight(0x9b5cff, 1.8, 7);
          lightB.position.set(-2.4, -1.2, 2.8);
          scene.add(lightA, lightB, new THREE.AmbientLight(0xffffff, 0.9));

          function resize() {
            const rect = host.getBoundingClientRect();
            const size = Math.max(1, Math.floor(rect.width));
            renderer.setSize(size, size, false);
            camera.aspect = 1;
            camera.updateProjectionMatrix();
          }

          const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          let frame = 0;
          function animate(time) {
            const t = time * 0.001;
            group.rotation.y = Math.sin(t * 0.75) * 0.42;
            group.rotation.z = Math.sin(t * 1.1) * 0.04;
            group.position.y = Math.sin(t * 1.8) * 0.13;
            ring.rotation.z = t * 0.9;
            core.rotation.z = -t * 1.35;
            renderer.render(scene, camera);
            if (!reducedMotion) frame = requestAnimationFrame(animate);
          }

          resize();
          window.addEventListener('resize', resize);
          host.classList.add('is-3d');
          if (reducedMotion) {
            renderer.render(scene, camera);
          } else {
            frame = requestAnimationFrame(animate);
          }
          window.addEventListener('pagehide', () => cancelAnimationFrame(frame), { once: true });
        })
        .catch(() => {
          host.classList.remove('is-3d');
        });
    })();
  </script>
  <script>
    (() => {
      const CDN = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
      let threePromise;
      const actors = [];

      function loadThree() {
        if (!threePromise) threePromise = import(CDN);
        return threePromise;
      }

      function hydrate() {
        const canvases = document.querySelectorAll('.piece-3d:not([data-ready])');
        if (!canvases.length) return;
        loadThree()
          .then((THREE) => {
            canvases.forEach((canvas) => {
              if (canvas.dataset.ready) return;
              canvas.dataset.ready = 'true';
              const frame = canvas.closest('.piece-frame');
              const side = canvas.dataset.side || 'player';
              const name = canvas.dataset.name || '';
              const mark = canvas.dataset.mark || '?';
              const leader = canvas.dataset.leader === 'true';
              const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
              renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
              renderer.outputColorSpace = THREE.SRGBColorSpace;

              const scene = new THREE.Scene();
              const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
              camera.position.set(0, 0.08, leader ? 4.25 : 3.85);

              const root = new THREE.Group();
              scene.add(root);

              const player = side === 'player';
              let primary = leader ? 0xd9ff5a : (player ? 0x31f4d3 : 0xff4f8b);
              let secondary = leader ? 0x31f4d3 : (player ? 0x29a9ff : 0x9b5cff);
              if (mark === '王') {
                primary = 0xd0a05a;
                secondary = 0x7a4a24;
              } else if (mark === '肉') {
                primary = 0xf4f1e8;
                secondary = 0xffb7c9;
              } else if (mark === '?') {
                primary = 0xe78a22;
                secondary = 0x19140f;
              } else if (mark === '卍') {
                primary = 0xf0c28b;
                secondary = 0x23242b;
              } else if (mark === '剛') {
                primary = 0xd66b22;
                secondary = 0x3a2a18;
              }
              const bodyMat = new THREE.MeshStandardMaterial({
                color: primary,
                emissive: primary,
                emissiveIntensity: 0.28,
                metalness: 0.32,
                roughness: 0.26
              });
              const trimMat = new THREE.MeshStandardMaterial({
                color: secondary,
                emissive: secondary,
                emissiveIntensity: 0.42,
                metalness: 0.38,
                roughness: 0.22
              });
              const darkMat = new THREE.MeshStandardMaterial({
                color: 0x061118,
                emissive: 0x010304,
                emissiveIntensity: 0.18,
                metalness: 0.16,
                roughness: 0.36
              });
              const lightMat = new THREE.MeshBasicMaterial({
                color: 0xecfff9,
                transparent: true,
                opacity: 0.9
              });
              const accentMat = new THREE.MeshStandardMaterial({
                color: 0xd9ff5a,
                emissive: 0x6f8f05,
                emissiveIntensity: 0.45,
                metalness: 0.18,
                roughness: 0.28
              });
              const whiteMat = new THREE.MeshStandardMaterial({
                color: 0xf8f4ed,
                emissive: 0x30261f,
                emissiveIntensity: 0.08,
                metalness: 0.05,
                roughness: 0.42
              });
              const pinkMat = new THREE.MeshStandardMaterial({
                color: 0xffb7c9,
                emissive: 0x4b1f30,
                emissiveIntensity: 0.16,
                metalness: 0.04,
                roughness: 0.36
              });

              const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.42, 0.66, 7, 18), bodyMat);
              body.position.y = -0.42;
              root.add(body);

              const head = new THREE.Mesh(new THREE.SphereGeometry(0.47, 28, 18), trimMat);
              head.position.y = 0.32;
              root.add(head);

              const visor = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.14, 0.08), lightMat);
              visor.position.set(0, 0.4, 0.43);
              root.add(visor);

              const core = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.033, 10, 42), lightMat);
              core.position.set(0, -0.34, 0.41);
              root.add(core);

              const armGeo = new THREE.CapsuleGeometry(0.075, 0.42, 6, 12);
              const armL = new THREE.Mesh(armGeo, bodyMat);
              armL.position.set(-0.48, -0.28, 0.03);
              armL.rotation.z = 0.72;
              const armR = armL.clone();
              armR.position.x = 0.48;
              armR.rotation.z = -0.72;
              root.add(armL, armR);

              const legGeo = new THREE.CapsuleGeometry(0.08, 0.34, 6, 12);
              const legL = new THREE.Mesh(legGeo, darkMat);
              legL.position.set(-0.18, -0.95, 0.02);
              legL.rotation.z = 0.16;
              const legR = legL.clone();
              legR.position.x = 0.18;
              legR.rotation.z = -0.16;
              root.add(legL, legR);

              addCharacterParts(THREE, root, { mark, name, leader, bodyMat, trimMat, darkMat, lightMat, accentMat, whiteMat, pinkMat });

              const halo = new THREE.Mesh(new THREE.TorusGeometry(0.74, 0.025, 8, 64), lightMat);
              halo.rotation.x = 1.22;
              halo.position.y = -0.18;
              root.add(halo);

              if (leader) {
                const crown = new THREE.Mesh(new THREE.TorusKnotGeometry(0.2, 0.035, 48, 8), lightMat);
                crown.position.y = 0.92;
                root.add(crown);
              } else if (mark === '卍' || mark === '剛') {
                const blade = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.58, 18), lightMat);
                blade.position.set(0.54, -0.08, 0.28);
                blade.rotation.z = -0.64;
                root.add(blade);
              }

              const key = new THREE.PointLight(primary, 2.1, 5);
              key.position.set(1.8, 1.4, 2.4);
              const fill = new THREE.PointLight(secondary, 1.4, 5);
              fill.position.set(-1.6, -0.8, 2.2);
              scene.add(key, fill, new THREE.AmbientLight(0xffffff, 0.85));

              frame?.classList.add('is-3d');
              actors.push({ THREE, canvas, renderer, scene, camera, root, halo, core, start: Math.random() * 10 });
              resizeActor(actors[actors.length - 1]);
            });
            startLoop();
          })
          .catch(() => {});
      }

      function resizeActor(actor) {
        const rect = actor.canvas.getBoundingClientRect();
        const size = Math.max(1, Math.floor(Math.min(rect.width || 80, rect.height || 80)));
        actor.renderer.setSize(size, size, false);
        actor.camera.aspect = 1;
        actor.camera.updateProjectionMatrix();
      }

      function addCharacterParts(THREE, root, kit) {
        const { mark, bodyMat, trimMat, darkMat, lightMat, accentMat, whiteMat, pinkMat } = kit;
        if (mark === '王') {
          const mane = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.13, 16, 40), trimMat);
          mane.position.set(0, 0.31, -0.02);
          mane.rotation.x = 0.08;
          root.add(mane);
          addEarPair(THREE, root, bodyMat, 0.36, 0.72, 0.17, 0.16);
          const muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.18, 18, 12), whiteMat);
          muzzle.scale.set(1.25, 0.72, 0.55);
          muzzle.position.set(0, 0.22, 0.44);
          root.add(muzzle);
          const cape = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.38, 0.05), accentMat);
          cape.position.set(0, -0.42, -0.22);
          cape.rotation.x = -0.18;
          root.add(cape);
        } else if (mark === '肉') {
          addEarPair(THREE, root, whiteMat, 0.32, 0.78, 0.19, 0.2);
          const innerL = new THREE.Mesh(new THREE.ConeGeometry(0.085, 0.19, 3), pinkMat);
          innerL.position.set(-0.32, 0.78, 0.19);
          innerL.rotation.set(0.1, 0, 0.48);
          const innerR = innerL.clone();
          innerR.position.x = 0.32;
          innerR.rotation.z = -0.48;
          root.add(innerL, innerR);
          const tail = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.045, 10, 32, Math.PI * 1.35), whiteMat);
          tail.position.set(0.48, -0.45, -0.1);
          tail.rotation.set(0.4, 0.2, -0.9);
          root.add(tail);
          const bell = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 12), accentMat);
          bell.position.set(0, -0.02, 0.45);
          root.add(bell);
        } else if (mark === '?') {
          addEarPair(THREE, root, bodyMat, 0.33, 0.7, 0.12, 0.13, true);
          const glasses = new THREE.Group();
          const lensL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.12, 0.045), darkMat);
          lensL.position.x = -0.14;
          const lensR = lensL.clone();
          lensR.position.x = 0.14;
          const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.035, 0.035), darkMat);
          glasses.add(lensL, lensR, bridge);
          glasses.position.set(0, 0.42, 0.48);
          root.add(glasses);
          const tail = new THREE.Mesh(new THREE.CapsuleGeometry(0.045, 0.38, 6, 10), bodyMat);
          tail.position.set(0.43, -0.58, -0.12);
          tail.rotation.set(0.25, 0.15, -0.82);
          root.add(tail);
          const pouch = new THREE.Mesh(new THREE.SphereGeometry(0.18, 18, 12), accentMat);
          pouch.scale.set(1.1, 0.7, 0.25);
          pouch.position.set(0, -0.36, 0.43);
          root.add(pouch);
        } else if (mark === '卍') {
          addHairSpikes(THREE, root, darkMat, 5);
          const sash = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.1, 0.06), accentMat);
          sash.position.set(0, -0.32, 0.48);
          sash.rotation.z = -0.32;
          root.add(sash);
          const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 10), trimMat);
          shoulderL.position.set(-0.42, -0.06, 0.24);
          const shoulderR = shoulderL.clone();
          shoulderR.position.x = 0.42;
          root.add(shoulderL, shoulderR);
        } else if (mark === '剛') {
          addHairSpikes(THREE, root, trimMat, 4);
          const armor = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.32, 0.08), darkMat);
          armor.position.set(0, -0.42, 0.44);
          root.add(armor);
          const hornL = new THREE.Mesh(new THREE.ConeGeometry(0.075, 0.32, 14), accentMat);
          hornL.position.set(-0.28, 0.76, 0.08);
          hornL.rotation.z = 0.45;
          const hornR = hornL.clone();
          hornR.position.x = 0.28;
          hornR.rotation.z = -0.45;
          root.add(hornL, hornR);
        } else if (mark === '光') {
          const wingL = new THREE.Mesh(new THREE.SphereGeometry(0.24, 18, 12), lightMat);
          wingL.scale.set(0.45, 1.25, 0.12);
          wingL.position.set(-0.52, -0.1, -0.08);
          wingL.rotation.z = -0.38;
          const wingR = wingL.clone();
          wingR.position.x = 0.52;
          wingR.rotation.z = 0.38;
          root.add(wingL, wingR);
          const star = new THREE.Mesh(new THREE.TetrahedronGeometry(0.16), accentMat);
          star.position.set(0, 0.86, 0.26);
          root.add(star);
        }
      }

      function addEarPair(THREE, root, mat, x, y, z, size, floppy = false) {
        const earL = new THREE.Mesh(new THREE.ConeGeometry(size, size * 1.55, 3), mat);
        earL.position.set(-x, y, z);
        earL.rotation.set(floppy ? 0.75 : 0.08, 0, floppy ? -0.8 : 0.48);
        const earR = earL.clone();
        earR.position.x = x;
        earR.rotation.z = floppy ? 0.8 : -0.48;
        root.add(earL, earR);
      }

      function addHairSpikes(THREE, root, mat, count) {
        for (let i = 0; i < count; i += 1) {
          const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.34, 14), mat);
          const offset = i - (count - 1) / 2;
          spike.position.set(offset * 0.13, 0.76 + Math.abs(offset) * -0.035, 0.12);
          spike.rotation.z = offset * -0.25;
          root.add(spike);
        }
      }

      let running = false;
      let raf = 0;
      function startLoop() {
        if (running) return;
        running = true;
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const tick = (time) => {
          actors.forEach((actor, index) => {
            if (!document.body.contains(actor.canvas)) return;
            const t = time * 0.001 + actor.start;
            actor.root.rotation.y = Math.sin(t * 1.1) * 0.45;
            actor.root.rotation.x = Math.sin(t * 0.8) * 0.08;
            actor.root.position.y = Math.sin(t * 2.2) * 0.08;
            actor.halo.rotation.z = t * (index % 2 ? -1.15 : 1.15);
            actor.core.rotation.z = -t * 1.7;
            actor.renderer.render(actor.scene, actor.camera);
          });
          if (!reducedMotion) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => actors.forEach(resizeActor));
      window.addEventListener('pagehide', () => cancelAnimationFrame(raf), { once: true });
      window.INMUPiece3D = { hydrate };
      hydrate();
    })();
  </script>
</body>
</html>
